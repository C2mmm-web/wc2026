# GitHub Actions workflow — auto-update the 2026 World Cup predictor in the cloud.
# Put this file in your repo at:  .github/workflows/update.yml
# It runs every 30 minutes (and on a manual click), pulls results from API-Football,
# recomputes the model, and publishes the webpage to GitHub Pages.

name: Update WC2026 predictions

on:
  push:
    branches: ["main"]       # deploy immediately after committed model/page changes.
  schedule:
    - cron: "*/30 * * * *"    # every 30 minutes; GitHub cron is UTC and may run a few minutes late.
  workflow_dispatch: {}         # adds a "Run workflow" button for manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install numpy scipy
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Fetch results + rebuild predictions
        working-directory: wc2026_pro
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python fetch_results.py || echo "API fetch skipped (no key or unreachable) — using existing data"
          python main.py
      - name: Prepare site (index.html)
        run: |
          mkdir -p _site
          cp wc2026_predictor.html _site/index.html
          cp wc2026_pro/predictions.json _site/predictions.json
          cp wc2026_pro/prediction_archive.json _site/prediction_archive.json
          cp wc2026_pro/audit_report.json _site/audit_report.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
